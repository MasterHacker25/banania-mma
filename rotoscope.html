<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotoscope</title>

    <!-- Better font pairing -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            min-height: 100vh;

            /* Cinematic dark gradient */
            background: linear-gradient(-45deg, #0f0f0f, #1a1a1a, #2a1f14, #3b2a1a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;

            display: flex;
            flex-direction: column;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            text-align: center;
            padding: 40px 20px 10px;
            animation: fadeDown 1s ease;
        }

        header h1 {
            margin: 0;
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            letter-spacing: 1px;
        }

        /* Back button */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: #f8fafc;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            animation: fadeUp 1.2s ease;
        }

        /* Video container */
        .video-container {
            width: 75%;
            max-width: 850px;
            aspect-ratio: 16 / 9;
            border-radius: 18px;
            overflow: hidden;

            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);

            box-shadow: 0 20px 50px rgba(0,0,0,0.6);

            transition: 0.4s;
        }

        .video-container:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 60px rgba(255, 170, 80, 0.25); /* warm glow */
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .description {
            max-width: 600px;
            text-align: center;
            font-size: 16px;
            color: rgba(255,255,255,0.75);
            line-height: 1.6;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Rotoscope Project</h1>
</header>

<a href="index.html" class="back-btn">← Back</a>

<div class="main">

    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/pFptt7Cargc"
        title="Tame Impala - Let It Happen"
        allowfullscreen></iframe>
    </div>

    <div class="description">
        This is a placeholder description for your rotoscope project. 
        You can explain your process, tools used, and what the video is about.
    </div>

</div>

<footer>
    <p>© 2026 Multimedia and Authoring | Banania, Carl Alvin R.</p>
</footer>

</body>
</html>
