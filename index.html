<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fdf6e3; /* cream background */
            color: #1e293b;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px; /* added more breathing space */
        }

        header h1 {
            margin: 0;
            font-size: 36px;
        }

        header p {
            margin-top: 10px;
            font-size: 16px;
            color: #475569;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px; /* more spacing between title and cards */
        }

        .container {
            display: flex;
            gap: 40px;
        }

        .card {
            width: 200px;
            height: 200px;
            background: #d2a679; /* light brown */
            color: #3b2f2f; /* darker brown text for better contrast */
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: scale(1.05);
            background: #b88a5a; /* darker brown on hover */
        }

        a {
            text-decoration: none;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #d2a679; /* light brown footer */
            color: #3b2f2f;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="main">
    <header>
        <h1>Multimedia and Authoring Portfolio</h1>
        <p>This is a short placeholder description for your website. You can change this anytime.</p>
    </header>

    <div class="container">
        <a href="rotoscope.html">
            <div class="card">Rotoscope</div>
        </a>

        <a href="blender.html">
            <div class="card">Blender</div>
        </a>
    </div>
</div>

<footer>
    <p>© 2026 Multimedia and Authoring | Banania, Carl Alvin R.</p>
</footer>

</body>
</html>
